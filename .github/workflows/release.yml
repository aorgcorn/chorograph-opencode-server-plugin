name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release
        run: swift build -c release

      - name: Package bundle
        id: package
        run: |
          set -euo pipefail
          PLUGIN_NAME="ChorographOpenCodeServerPlugin"
          DYLIB=".build/release/lib${PLUGIN_NAME}.dylib"
          BUNDLE_DIR="${PLUGIN_NAME}.bundle"
          ZIP_NAME="${BUNDLE_DIR}.zip"

          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          cp "${DYLIB}" "${BUNDLE_DIR}/Contents/MacOS/${PLUGIN_NAME}"

          # Fix the dylib install name. SPM sets it to @rpath/lib<Name>.dylib,
          # but the binary lives at Contents/MacOS/<Name> (no lib prefix, no
          # .dylib extension). Rewrite the install name to @rpath/<Name> so
          # the self-referential rpath dependency resolves correctly at dlopen
          # time regardless of where the bundle is placed on the user's system.
          install_name_tool -id \
            "@rpath/${PLUGIN_NAME}" \
            "${BUNDLE_DIR}/Contents/MacOS/${PLUGIN_NAME}"

          cat > "${BUNDLE_DIR}/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ChorographOpenCodeServerPlugin</string>
              <key>CFBundleIdentifier</key>
              <string>com.aorgcorn.chorograph.plugin.opencode-server</string>
              <key>CFBundlePackageType</key>
              <string>BNDL</string>
          </dict>
          </plist>
          PLIST

          zip -r "${ZIP_NAME}" "${BUNDLE_DIR}"

          CHECKSUM=$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
          body: |
            ## SHA-256
            `${{ steps.package.outputs.checksum }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
